<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>
    <button onclick="sendTest()">Send Test Message</button>

    <script>
        const ws = new WebSocket('ws://localhost:8000/ws/swarm/test-doc-123');
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');

        ws.onopen = () => {
            statusDiv.textContent = 'Connected!';
            statusDiv.style.color = 'green';
            console.log('WebSocket connected');
        };

        ws.onmessage = (event) => {
            const msg = document.createElement('div');
            msg.textContent = 'Received: ' + event.data;
            messagesDiv.appendChild(msg);
            console.log('Received:', event.data);
        };

        ws.onerror = (error) => {
            statusDiv.textContent = 'Error!';
            statusDiv.style.color = 'red';
            console.error('WebSocket error:', error);
        };

        ws.onclose = (event) => {
            statusDiv.textContent = 'Disconnected';
            statusDiv.style.color = 'orange';
            console.log('WebSocket closed:', event.code, event.reason);
        };

        function sendTest() {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ user_prompt: "generate hello world" }));
                console.log('Sent test message');
            } else {
                alert('WebSocket is not connected');
            }
        }
    </script>
</body>
</html>
